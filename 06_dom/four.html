<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;
        color: white;
        
    ">
    <ul class="language">
        <li>Javascript</li>
    </ul>

</body>
<script>
    function addLang(lang){
        const li=document.createElement('li')
        li.innerText=`${lang}`
        document.querySelector('.language').appendChild(li)
    } //here we must traverse tree then manipulate
    addLang('python')

    function addOptimisedLang(lang){
        const li=document.createElement('li')
        li.appendChild(document.createTextNode(lang))
        document.querySelector('.language').appendChild(li)
    }//optimised because we dont need to traverse tree each time we just keep appending ->PREFERRED
    addOptimisedLang('java')

    // Edit elements
    const secondChild=document.querySelector('li:nth-child(2)') //psuedo class in css
    // console.log(secondChild)
    //secondChild.innerHTML='not optimised' 

    const newLi=document.createElement('li')
    newLi.textContent='Mojo'
    secondChild.replaceWith(newLi)

    // edit eg 2
        const firstChild=document.querySelector('li:first-child') //psuedo class in css
        // const firstChild=document.querySelector('li:nth-child(1)') //psuedo class in css
        console.log(firstChild)
        firstChild.outerHTML='<li>CPP</li>'
    
    // remove
    const lastLang=document.querySelector('li:last-child')
    lastLang.remove()
</script>
</html>
