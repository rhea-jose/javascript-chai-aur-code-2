        <div class="day">Wednesday</div>

</body>
<script>

    // to directly choose child mention its class
    const dayOne=document.querySelector('.day')
    console.log(dayOne)

    // using querySelector each time isnt advisable because

    // to get parent from child
    console.log(dayOne.parentElement)
    console.log(dayOne.nextElementSibling)


    // DOM is a tree structure and evrything has its importance
