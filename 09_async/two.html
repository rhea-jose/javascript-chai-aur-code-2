    const secondView =()=>document.querySelector('h1').textContent="By Rhea "

    const change =setTimeout(secondView,4000)
    // clearTimeout(change) //removes callback from queue so setTimeout doesnt function now, but iska toh koi sense i nahi bana ki bas set karke clear kiya
    // clear kisi condition ke basis pe karo
    document.querySelector('#stop').addEventListener('click',()=>{
        clearTimeout(change)
