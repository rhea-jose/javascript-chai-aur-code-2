<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;color:aliceblue;" >
    <!-- 0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete. -->
<button class="card">Click to view card</button>
</body>
<script>
    const onClick=function(){
        const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
        const xhr = new XMLHttpRequest();
        xhr.open('GET', requestUrl)
        xhr.onreadystatechange = function(){
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText)
            const followers=data.followers
            const avatar=data.avatar_url
            document.querySelector('body').innerHTML=`<fieldset style="height: 400px; width: 400px;"><img style="height: 200px; width: 200px; align:center " src=${avatar} alt=/"avatar of user"><p style="text-align:center;">${followers}</p></fieldset>`
            }
        }
        xhr.send();
    }
    document.querySelector('.card').addEventListener('click',onClick);
</script>
</html>
